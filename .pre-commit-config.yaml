# Pre-commit hooks for this repo.
# Setup (once per clone):  pip install pre-commit  &&  pre-commit install
# Manual full scan:        pre-commit run --all-files
#
# gitleaks scans staged changes on every commit and blocks the commit if a
# secret (token, key, credential) is detected. It does NOT prevent committing
# .env files by itself — .gitignore handles that — but it catches secret
# *values* pasted anywhere in tracked files.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
